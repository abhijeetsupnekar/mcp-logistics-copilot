name: Build and deploy Python app to Azure Web App - abhi-logistics-mcp

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

permissions:
  contents: read

steps:
  - uses: actions/checkout@v4

  - name: Set up Python version
    uses: actions/setup-python@v5
    with:
      python-version: '3.11'

  - name: Create and Start virtual environment and Install dependencies
    working-directory: mcp-servers/logistics-mcp
    run: |
      python -m venv antenv
      source antenv/bin/activate
      python -m pip install --upgrade pip
      pip install -r requirements.txt

  - name: Upload artifact for deployment jobs
    uses: actions/upload-artifact@v4
    with:
      name: python-app
      path: mcp-servers/logistics-mcp

deploy:
runs-on: ubuntu-latest
needs: build

permissions:
  id-token: write
  contents: read

steps:
  - name: Download artifact from build job
    uses: actions/download-artifact@v4
    with:
      name: python-app

  - name: Login to Azure
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_561982CD57C14F2BA824C334D9217228 }}
      tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_72CC9067190844948EBDFC7A9321FF74 }}
      subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_5BD36945D36A410E9DF9D08F447397EE }}

  - name: Deploy to Azure Web App
    id: deploy-to-webapp
    uses: azure/webapps-deploy@v3
    with:
      app-name: 'abhi-logistics-mcp'
      slot-name: 'Production'
      package: .