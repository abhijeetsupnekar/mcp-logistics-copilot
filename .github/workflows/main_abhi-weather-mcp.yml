name: Build and deploy Python app to Azure Web App - abhi-weather-mcp

on:
push:
branches:
- main
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest
permissions:
contents: read

```
steps:
  - uses: actions/checkout@v4

  - name: Set up Python version
    uses: actions/setup-python@v5
    with:
      python-version: '3.12'

  - name: Create and Start virtual environment and Install dependencies
    run: |
      cd mcp-servers/weather-mcp
      python -m venv antenv
      source antenv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt

  - name: Upload artifact for deployment jobs
    uses: actions/upload-artifact@v4
    with:
      name: python-app
      path: |
        mcp-servers/weather-mcp
        !mcp-servers/weather-mcp/antenv/
```

deploy:
runs-on: ubuntu-latest
needs: build
permissions:
id-token: write
contents: read

```
steps:
  - name: Download artifact from build job
    uses: actions/download-artifact@v4
    with:
      name: python-app

  - name: Login to Azure
    uses: azure/login@v2
    with:
      client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_A7C6F1D11A0F40248D51D34E3282FCD3 }}
      tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_D9FC87425DA74BC583A777655A369F9A }}
      subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_899214B6E32D4DA78BB75C4DDEA9E0F4 }}

  - name: Deploy to Azure Web App
    id: deploy-to-webapp
    uses: azure/webapps-deploy@v3
    with:
      app-name: 'abhi-weather-mcp'
      slot-name: 'Production'
```
